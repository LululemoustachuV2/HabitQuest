services:
  db:
    image: postgres:15
    container_name: habitquest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: habitquest
      POSTGRES_USER: habitquest
      POSTGRES_PASSWORD: habitquest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
